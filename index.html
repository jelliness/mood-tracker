<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodJar</title>
  <!-- Apply saved theme before CSS paint to avoid flash -->
  <script>
    try {
      const s = localStorage.getItem('moodjar_settings')
      const theme = s ? (JSON.parse(s).theme ?? 'light') : 'light'
      if (theme === 'light') document.documentElement.dataset.theme = 'light'
    } catch { document.documentElement.dataset.theme = 'light' }
  </script>
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/moods.css" />
  <link rel="stylesheet" href="/src/styles/jar.css" />
  <link rel="stylesheet" href="/src/styles/insights.css" />
  <link rel="stylesheet" href="/src/styles/reflections.css" />
  <link rel="stylesheet" href="/src/styles/camera.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-inner">
        <div class="app-logo">
          <span class="logo-icon">🫙</span>
          <span class="logo-text">MoodJar</span>
        </div>
        <nav class="tab-nav" role="tablist">
          <button class="tab-btn active" data-tab="today" role="tab" aria-selected="true">
            <span class="tab-icon">✍️</span>
            <span class="tab-label">Today</span>
          </button>
          <button class="tab-btn" data-tab="insights" role="tab" aria-selected="false">
            <span class="tab-icon">📊</span>
            <span class="tab-label">Insights</span>
          </button>
          <button class="tab-btn" data-tab="jar" role="tab" aria-selected="false">
            <span class="tab-icon">🫙</span>
            <span class="tab-label">Monthly Jar</span>
          </button>
          <button class="tab-btn" data-tab="reflections" role="tab" aria-selected="false">
            <span class="tab-icon">💭</span>
            <span class="tab-label">Reflections</span>
          </button>
          <button class="tab-btn" data-tab="camera" role="tab" aria-selected="false">
            <span class="tab-icon">📸</span>
            <span class="tab-label">Camera</span>
          </button>
        </nav>
        <div class="header-controls">
          <div id="streak-badge" class="streak-badge" title="Current logging streak" aria-label="Current streak">
            <span class="streak-icon">🔥</span>
            <span id="streak-count">0</span>
            <span class="streak-label">day streak</span>
          </div>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">🌙</button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div id="view-today" class="view active"></div>
      <div id="view-insights" class="view"></div>
      <div id="view-jar" class="view"></div>
      <div id="view-reflections" class="view"></div>
      <div id="view-camera" class="view"></div>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
