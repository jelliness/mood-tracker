<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodJar</title>
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/moods.css" />
  <link rel="stylesheet" href="/src/styles/jar.css" />
  <link rel="stylesheet" href="/src/styles/insights.css" />
  <link rel="stylesheet" href="/src/styles/reflections.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-inner">
        <div class="app-logo">
          <span class="logo-icon">🫙</span>
          <span class="logo-text">MoodJar</span>
        </div>
        <nav class="tab-nav" role="tablist">
          <button class="tab-btn active" data-tab="today" role="tab" aria-selected="true">
            <span class="tab-icon">✍️</span>
            <span class="tab-label">Today</span>
          </button>
          <button class="tab-btn" data-tab="insights" role="tab" aria-selected="false">
            <span class="tab-icon">📊</span>
            <span class="tab-label">Insights</span>
          </button>
          <button class="tab-btn" data-tab="jar" role="tab" aria-selected="false">
            <span class="tab-icon">🫙</span>
            <span class="tab-label">Monthly Jar</span>
          </button>
          <button class="tab-btn" data-tab="reflections" role="tab" aria-selected="false">
            <span class="tab-icon">💭</span>
            <span class="tab-label">Reflections</span>
          </button>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <div id="view-today" class="view active"></div>
      <div id="view-insights" class="view"></div>
      <div id="view-jar" class="view"></div>
      <div id="view-reflections" class="view"></div>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
